<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Karin 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 40%, #1a0a14 0%, #0a0508 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  .star {
    position: fixed; border-radius: 50%; background: white; pointer-events: none;
    animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.1; } 50% { opacity: 0.8; }
  }

  .center {
    display: flex; flex-direction: column;
    align-items: center; gap: 16px;
    position: relative; z-index: 10;
    padding: 20px;
  }

  .label {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 4vw, 1.4rem);
    color: rgba(249,197,209,0.6);
    letter-spacing: 0.12em;
    text-align: center;
  }

  .btn {
    position: relative;
    padding: 20px 52px;
    background: transparent;
    border: 1.5px solid #e8507a;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 3.5vw, 1.3rem);
    color: #fff8f0;
    letter-spacing: 0.1em;
    line-height: 1.7;
    text-align: center;
    transition: border-color 0.3s, color 0.3s, transform 0.15s;
  }
  .btn::after {
    content: '';
    position: absolute; inset: -1px; border-radius: 2px; pointer-events: none;
    animation: btn-glow 2.5s ease-in-out infinite;
  }
  @keyframes btn-glow {
    0%,100% { box-shadow: 0 0 14px 3px rgba(232,80,122,0.3); }
    50%      { box-shadow: 0 0 32px 8px rgba(232,80,122,0.65); }
  }
  .btn:hover { border-color: #f0c060; color: #f0c060; transform: scale(1.04); }
  .btn:active { transform: scale(0.96); }
  .btn.popped { animation: pop-shake 0.45s ease; }
  @keyframes pop-shake {
    0%,100%{ transform:scale(1) rotate(0deg); }
    25%    { transform:scale(1.1) rotate(-2deg); }
    50%    { transform:scale(1.06) rotate(2deg); }
    75%    { transform:scale(1.03) rotate(-1deg); }
  }

  /* Music player */
  .music-player {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(26, 4, 18, 0.85);
    border: 1px solid rgba(232,80,122,0.35);
    border-radius: 50px;
    padding: 10px 20px;
    z-index: 50;
    backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.8s ease;
    pointer-events: none;
  }
  .music-player.visible {
    opacity: 1;
    pointer-events: all;
  }
  .music-note {
    font-size: 16px;
    animation: note-pulse 1.4s ease-in-out infinite;
  }
  @keyframes note-pulse {
    0%,100% { transform: scale(1) rotate(-8deg); opacity:0.7; }
    50%      { transform: scale(1.2) rotate(8deg); opacity:1; }
  }
  .music-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: rgba(249,197,209,0.75);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .play-pause-btn {
    background: none;
    border: 1px solid rgba(232,80,122,0.5);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f9c5d1;
    font-size: 11px;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .play-pause-btn:hover {
    background: rgba(232,80,122,0.2);
    border-color: #e8507a;
  }

  /* equalizer bars */
  .eq {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
  }
  .eq-bar {
    width: 3px;
    background: #e8507a;
    border-radius: 2px;
    animation: eq-dance var(--spd) ease-in-out infinite alternate;
  }
  @keyframes eq-dance {
    0%   { height: 3px; opacity: 0.5; }
    100% { height: 16px; opacity: 1; }
  }
  .eq-bar:nth-child(1) { --spd: 0.45s; }
  .eq-bar:nth-child(2) { --spd: 0.65s; animation-delay: 0.1s; }
  .eq-bar:nth-child(3) { --spd: 0.55s; animation-delay: 0.2s; }
  .eq-bar:nth-child(4) { --spd: 0.7s;  animation-delay: 0.05s; }
  .eq-bar:nth-child(5) { --spd: 0.5s;  animation-delay: 0.15s; }
  .eq.paused .eq-bar { animation-play-state: paused; height: 4px; }

  /* burst ring */
  .ring {
    position: fixed; pointer-events: none; z-index: 20;
    border-radius: 50%;
    border: 2px solid var(--rc);
    width: 10px; height: 10px;
    transform: translate(-50%,-50%) scale(0);
    animation: ring-out 0.95s ease-out forwards;
  }
  @keyframes ring-out {
    0%   { transform:translate(-50%,-50%) scale(0); opacity:1; width:10px; height:10px; }
    100% { transform:translate(-50%,-50%) scale(1); opacity:0; width:380px; height:380px; }
  }

  .flower-pop {
    position: fixed; pointer-events: none; z-index: 30;
    transform-origin: center center;
    animation: flower-fly var(--dur) cubic-bezier(0.22,1,0.36,1) forwards;
  }
  @keyframes flower-fly {
    0%   { opacity:0; transform:translate(-50%,-100%) translate(0,0) rotate(var(--tilt)) scale(0.15); }
    12%  { opacity:1; }
    65%  { opacity:1; transform:translate(-50%,-100%) translate(calc(var(--tx)*0.9),calc(var(--ty)*0.9)) rotate(var(--tilt)) scale(1.1); }
    100% { opacity:0; transform:translate(-50%,-100%) translate(var(--tx),calc(var(--ty) + 70px)) rotate(var(--tilt)) scale(0.75); }
  }
</style>
</head>
<body>

<div id="stars"></div>

<audio id="bgMusic" loop preload="auto" autoplay>
  <source id="audioSrc" src="" type="audio/mpeg">
</audio>

<div class="center">
  <div class="label">✦ untuk Karin ✦</div>
  <button class="btn" id="mainBtn" onclick="onPress(this)">
    🌹 Selamat atas kemenanganmu, sayang! 🌹<br>
    <span style="font-size:0.78em;opacity:0.65;font-style:normal;letter-spacing:0.2em;">aku punya hadiah buat kamu — pencet di sini 🌸</span>
  </button>
</div>

<div class="music-player" id="musicPlayer">
  <span class="music-note">🎵</span>
  <div class="eq" id="eqBars">
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
    <div class="eq-bar"></div>
  </div>
  <span class="music-label">spesial untuk Karin</span>
  <button class="play-pause-btn" id="playPauseBtn" onclick="toggleMusic()">❚❚</button>
</div>

  audio.load();

  // Try to autoplay immediately on page load
  function tryPlay() {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('musicPlayer').classList.add('visible');
      document.getElementById('playPauseBtn').textContent = '❚❚';
    }).catch(() => {
      // Autoplay blocked - play on first interaction
      const playOnInteract = () => {
        audio.play().then(() => {
          isPlaying = true;
          document.getElementById('musicPlayer').classList.add('visible');
          document.getElementById('playPauseBtn').textContent = '❚❚';
        });
        document.removeEventListener('click', playOnInteract);
        document.removeEventListener('touchstart', playOnInteract);
        document.removeEventListener('keydown', playOnInteract);
      };
      document.addEventListener('click', playOnInteract);
      document.addEventListener('touchstart', playOnInteract);
      document.addEventListener('keydown', playOnInteract);
    });
  }

  window.addEventListener('load', tryPlay);

  function makeSVGFlower(petal, center, stem, sc) {
    const w = Math.round(54 * sc), h = Math.round(130 * sc);
    return `<svg width="${w}" height="${h}" viewBox="0 0 54 130" xmlns="http://www.w3.org/2000/svg">
      <line x1="27" y1="56" x2="27" y2="130" stroke="${stem}" stroke-width="3.5" stroke-linecap="round"/>
      <ellipse cx="18" cy="78" rx="14" ry="6" fill="${stem}" transform="rotate(-40,18,78)" opacity="0.95"/>
      <ellipse cx="36" cy="95" rx="14" ry="6" fill="${stem}" transform="rotate(40,36,95)" opacity="0.95"/>
      <ellipse cx="18" cy="112" rx="12" ry="5" fill="${stem}" transform="rotate(-30,18,112)" opacity="0.8"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(0,27,30)"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(45,27,30)"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(90,27,30)"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(135,27,30)"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(180,27,30)"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(225,27,30)"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(270,27,30)"/>
      <ellipse cx="27" cy="9"  rx="8" ry="15" fill="${petal}" opacity="0.88" transform="rotate(315,27,30)"/>
      <circle cx="27" cy="30" r="11" fill="${center}"/>
      <circle cx="27" cy="30" r="6"  fill="${petal}" opacity="0.5"/>
      <circle cx="27" cy="30" r="3"  fill="${center}" opacity="0.8"/>
    </svg>`;
  }

  const types = [
    {petal:'#e8507a', center:'#8b0030', stem:'#4caf7a'},
    {petal:'#f48fb1', center:'#c2185b', stem:'#43a047'},
    {petal:'#ff8a65', center:'#bf360c', stem:'#388e3c'},
    {petal:'#ce93d8', center:'#7b1fa2', stem:'#4caf7a'},
    {petal:'#fff176', center:'#f9a825', stem:'#558b2f'},
    {petal:'#ef9a9a', center:'#b71c1c', stem:'#4caf7a'},
    {petal:'#f8bbd0', center:'#880e4f', stem:'#43a047'},
    {petal:'#80cbc4', center:'#00695c', stem:'#388e3c'},
  ];

  let musicPlayed = false;
  let isPlaying = false;

  function toggleMusic() {
    const btn = document.getElementById('playPauseBtn');
    const eq = document.getElementById('eqBars');
    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      btn.textContent = '▶';
      eq.classList.add('paused');
    } else {
      audio.play();
      isPlaying = true;
      btn.textContent = '❚❚';
      eq.classList.remove('paused');
    }
  }

  function onPress(btn) {
    btn.classList.remove('popped');
    void btn.offsetWidth;
    btn.classList.add('popped');

    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;

    ['#e8507a','#f0c060','#f48fb1','#ce93d8'].forEach((rc, i) => {
      const r = document.createElement('div');
      r.className = 'ring';
      r.style.cssText = `left:${cx}px;top:${cy}px;--rc:${rc};animation-delay:${i*0.2}s;`;
      document.body.appendChild(r);
      setTimeout(() => r.remove(), 1400);
    });

    const count = 42;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const f = document.createElement('div');
        f.className = 'flower-pop';
        const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.45;
        const dist  = 120 + Math.random() * 260;
        const tx    = Math.cos(angle) * dist;
        const ty    = Math.sin(angle) * dist - 20;
        const tilt  = ((Math.random() - 0.5) * 40).toFixed(1) + 'deg';
        const dur   = (1.3 + Math.random() * 0.85).toFixed(2) + 's';
        const sc    = 0.55 + Math.random() * 0.9;
        const t     = types[Math.floor(Math.random() * types.length)];
        f.innerHTML = makeSVGFlower(t.petal, t.center, t.stem, sc);
        f.style.cssText = `left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;--tilt:${tilt};--dur:${dur};`;
        document.body.appendChild(f);
        setTimeout(() => f.remove(), parseFloat(dur) * 1000 + 150);
      }, i * 28);
    }

    const hearts = ['❤️','🩷','💖','💗','💕','💓','🌹','💝'];
    const hCount = 20;
    for (let i = 0; i < hCount; i++) {
      setTimeout(() => {
        const h = document.createElement('div');
        h.className = 'flower-pop';
        const angle = (i / hCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
        const dist  = 80 + Math.random() * 300;
        const tx    = Math.cos(angle) * dist;
        const ty    = Math.sin(angle) * dist - 40;
        const tilt  = ((Math.random() - 0.5) * 60).toFixed(1) + 'deg';
        const dur   = (1.1 + Math.random() * 1).toFixed(2) + 's';
        const fs    = 18 + Math.random() * 26;
        h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        h.style.cssText = `left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;--tilt:${tilt};--dur:${dur};font-size:${fs}px;line-height:1;`;
        document.body.appendChild(h);
        setTimeout(() => h.remove(), parseFloat(dur) * 1000 + 150);
      }, i * 45 + 80);
    }

    const loveWords = ['LOVE','❤','♡','KARIN','🌸'];
    for (let i = 0; i < 8; i++) {
      setTimeout(() => {
        const lv = document.createElement('div');
        lv.className = 'flower-pop';
        const angle = Math.random() * Math.PI * 2;
        const dist  = 100 + Math.random() * 180;
        const tx    = Math.cos(angle) * dist;
        const ty    = Math.sin(angle) * dist - 30;
        const tilt  = ((Math.random() - 0.5) * 25).toFixed(1) + 'deg';
        const dur   = (1.4 + Math.random() * 0.7).toFixed(2) + 's';
        const fs    = 13 + Math.random() * 14;
        lv.textContent = loveWords[Math.floor(Math.random() * loveWords.length)];
        lv.style.cssText = `left:${cx}px;top:${cy}px;--tx:${tx}px;--ty:${ty}px;--tilt:${tilt};--dur:${dur};font-size:${fs}px;font-family:'Playfair Display',serif;font-style:italic;color:#f9c5d1;letter-spacing:0.1em;white-space:nowrap;`;
        document.body.appendChild(lv);
        setTimeout(() => lv.remove(), parseFloat(dur) * 1000 + 150);
      }, i * 60 + 150);
    }

    // Music already playing from page load
  }
</script>
</body>
</html>
